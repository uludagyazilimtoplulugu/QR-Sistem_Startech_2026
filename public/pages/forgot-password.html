<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">⚡ QR Sistem</div>
    <div class="auth-subtitle" data-i18n="auth.reset_subtitle">Şifrenizi sıfırlayın</div>

    <div class="card" id="fp-step-email">
      <form id="fp-email-form">
        <div class="form-group">
          <label class="form-label" data-i18n="auth.email">E-posta</label>
          <input type="email" id="fp-email" class="form-input" placeholder="ornek@email.com" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" data-i18n="auth.send_code">Kod Gönder</button>
      </form>
    </div>

    <div class="card hidden" id="fp-step-code">
      <form id="fp-code-form">
        <div class="form-group">
          <label class="form-label" data-i18n="auth.reset_code">Doğrulama Kodu (6 haneli)</label>
          <input type="text" id="fp-code" class="form-input" placeholder="123456" required maxlength="6" pattern="[0-9]{6}">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="auth.new_password">Yeni Şifre</label>
          <input type="password" id="fp-new-password" class="form-input" placeholder="En az 6 karakter" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-lg" data-i18n="auth.reset_btn">Şifreyi Değiştir</button>
      </form>
    </div>

    <div class="auth-link">
      <a href="#/login" data-i18n="auth.back_to_login">Girişe Dön</a>
    </div>
  </div>
</div>
