<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><img src="/images/startech_logo.png" alt="Startech 2026" style="max-width:200px"></div>
    <div class="auth-subtitle" data-i18n="auth.login_subtitle">Etkinliğe hoş geldiniz</div>

    <div class="card">
      <form id="login-form">
        <div class="form-group">
          <label class="form-label" data-i18n="auth.email">E-posta</label>
          <input type="email" id="login-email" class="form-input" placeholder="ornek@email.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="auth.password">Şifre</label>
          <input type="password" id="login-password" class="form-input" placeholder="••••••" required minlength="6">
        </div>
        <button type="submit" id="login-btn" class="btn btn-primary btn-lg" data-i18n="auth.login_btn">Giriş Yap</button>
      </form>
    </div>

    <div class="auth-link">
      <a href="#/forgot-password" data-i18n="auth.forgot_password">Şifremi Unuttum</a>
    </div>
    <div class="auth-link">
      <span data-i18n="auth.no_account">Hesabınız yok mu?</span>
      <a href="#/register" data-i18n="auth.register_link">Kayıt Ol</a>
    </div>
  </div>
</div>
